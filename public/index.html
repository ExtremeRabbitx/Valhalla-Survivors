<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Valhalla Survivors</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="lobby" class="screen">
  <h1>⚔️ Valhalla Survivors</h1>
  <p class="subtitle">รอดชีวิตจากกองทัพดราวเกอร์ให้นานที่สุด ร่วมมือกับเพื่อน!</p>
  <input id="nameInput" placeholder="ชื่อของคุณ (นักรบไวกิ้ง)" maxlength="16" />

  <div class="row">
    <button id="createBtn">สร้างห้องใหม่</button>
  </div>

  <div class="row">
    <input id="roomInput" placeholder="รหัสห้อง" maxlength="6" style="text-transform:uppercase" />
    <button id="joinBtn">เข้าร่วมห้อง</button>
  </div>

  <p id="lobbyMsg" class="msg"></p>
</div>

<div id="waitingRoom" class="screen hidden">
  <h2>ห้อง: <span id="roomCode"></span></h2>
  <p>ส่งลิงก์นี้ให้เพื่อน:</p>
  <div class="row">
    <input id="shareLink" readonly />
    <button id="copyBtn">คัดลอก</button>
  </div>
  <p id="playerCount"></p>
  <button id="startBtn">เริ่มเกม ⚔️</button>
</div>

<div id="gameScreen" class="screen hidden">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="timer">00:00</div>
    <div id="statsPanel"></div>
  </div>
  <div id="upgradeOverlay" class="hidden">
    <h2>เลือกพลังใหม่!</h2>
    <div id="upgradeChoices"></div>
  </div>
  <div id="touchJoystick" class="hidden">
    <div id="joystickBase"><div id="joystickKnob"></div></div>
  </div>
  <div id="gameOverOverlay" class="hidden">
    <h2>เกมจบแล้ว</h2>
    <p id="gameOverStats"></p>
    <button onclick="location.reload()">เล่นอีกครั้ง</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
